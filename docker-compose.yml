version: "3.9"

services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8012:8000"
    volumes:
      - memorials-data:/app/data
      - memorials-uploads:/app/uploads
      - memorials-output:/app/output
      - ./backend/assets/graphics:/app/graphics:ro
    environment:
      DATABASE_URL: "sqlite:///./data/memorials.db"
      UPLOAD_DIR: "./uploads"
      OUTPUT_DIR: "./output"
      GRAPHICS_DIR: "./graphics"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3012:3000"
    depends_on:
      - backend

volumes:
  memorials-data:
  memorials-uploads:
  memorials-output:
